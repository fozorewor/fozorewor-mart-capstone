<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fozorewor Mart</title>
 
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }
 
    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid #ccc;
    }
 
    .logo {
      font-weight: bold;
      width: 200px;
    }
 
    .search {
      flex: 1;
      display: flex;
      justify-content: center;
    }
 
    .search input {
      width: 400px;
      padding: 8px;
    }
 
    .search button {
      padding: 8px;
    }
 
    .cart {
      width: 150px;
      text-align: right;
    }
 
    /* Categories */
    .categories {
      display: flex;
      gap: 15px;
      padding: 15px;
    }
 
    .category {
      border: 1px solid #ccc;
      padding: 10px;
      width: 100px;
      text-align: center;
      border-radius: 10px;
    }
</style>
 
</head>
 
<body>
 
  <!-- Header -->
<div class="header">
<div class="logo">🛒 Fozorewor Mart</div>
 
    <div class="search">
<input type="text" placeholder="Search for groceries">
<button>🔍</button>
</div>
 
    <div class="cart">My Cart (0)</div>
</div>
 
  <!-- Categories -->
<div class="categories">
<div class="category">All</div>
<div class="category">Dairy</div>
<div class="category">Fruits</div>
<div class="category">Grains</div>
<div class="category">Meat</div>
<div class="category">Snacks</div>
<div class="category">Vegetables</div>
</div>

  <p id="hello-world" style="padding: 0 15px 15px;">Loading...</p>

<script>
  async function helloworld() {
    try {
      const response = await fetch("/api/hello");

      if (response.status !== 200) {
        throw new Error(`Unexpected status: ${response.status}`);
      }

      const data = await response.json();
      document.getElementById("hello-world").textContent = data.message;
    } catch (error) {
      document.getElementById("hello-world").textContent =
        "Failed to load Hello World";
      console.error(error);
    }
  }

  helloworld();
</script>
 
</body>
</html>
